name: Firmware Build

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: qmk_firmware

      - name: Install QMK CLI
        run: pip3 install qmk

      - name: Setup QMK dependencies only
        run: |
          cd "$GITHUB_WORKSPACE/qmk_firmware"
          qmk setup -H "$GITHUB_WORKSPACE/qmk_firmware" --yes

      - name: Install QMK Python dependencies
        run: |
          cd "$GITHUB_WORKSPACE/qmk_firmware"
          pip3 install -r requirements.txt

      - name: Build firmware
        run: |
          cd "$GITHUB_WORKSPACE/qmk_firmware"
          qmk compile -kb sofle/rev1 -km default -e CONVERT_TO=helios

      - name: Copy firmware to workspace root
        run: cp "$GITHUB_WORKSPACE/qmk_firmware/qmk_firmware/.build/sofle_rev1_default_helios.uf2" "$GITHUB_WORKSPACE/sofle_rev1_default_helios.uf2"

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: sofle-helios-firmware
          path: ${{ github.workspace }}/sofle_rev1_default_helios.uf2
