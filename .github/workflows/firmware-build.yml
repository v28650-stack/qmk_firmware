name: QMK Diagnostic

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-22.04

    steps:
      - name: Install QMK CLI
        run: pip3 install qmk

      - name: Setup QMK
        run: qmk setup -H "$HOME/qmk_firmware" --yes

      - name: Show keyboards folder
        run: |
          cd "$HOME/qmk_firmware/keyboards"
          echo "=== keyboards ==="
          ls -R .
 
