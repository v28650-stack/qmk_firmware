name: Build QMK Firmware

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo (Shallow Clone)
        uses: actions/checkout@v4
        with:
          submodules: false # Skip automatic submodule processing to save cloning time

      - name: Initialize Specific Submodules Only
        run: |
          git submodule update --init --depth 1 lib/pigweed
          git submodule update --init --depth 1 lib/python

      - name: Install QMK CLI Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi
          python3 -m pip install qmk

      - name: Run QMK Compile
        run: |
          qmk compile -kb sofle/rev1 -km default -e CONVERT_TO=helios

      - name: Upload Firmware Artifacts
        uses: actions/artifacts/upload@v4
        with:
          name: sofle_helios_firmware
          path: |
            *.hex
            *.bin
            *.uf2
