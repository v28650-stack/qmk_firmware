name: QMK Firmware Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache QMK Toolchain & Objects
        uses: actions/cache@v4
        with:
          path: |
            ~/.build
            qamak_firmware/.build
            qmk_firmware/lib
          key: ${{ runner.os }}-qmk-${{ hashFiles('**/rules.mk', '**/config.h') }}
          restore-keys: |
            ${{ runner.os }}-qmk-

      - name: Install QMK CLI and Dependencies
        run: |
          python3 -m pip install --user qmk
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup QMK
        run: qmk setup -y

      - name: Compile Firmware
        run: qmk compile -kb sofle/rev1 -km default -e CONVERT_TO=helios

      - name: Upload Firmware Binary
        uses: actions/upload-artifact@v4
        with:
          name: sofle_helios_firmware
          path: "**/*.uf2"
